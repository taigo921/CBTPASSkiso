<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CBT PASS クイズ</title>
<style>
  :root{
    --green:#0E5E45;--green-d:#0a4736;--green-l:#1B7D5E;--ink:#13201b;--muted:#5d6b64;
    --line:#e3e8e5;--bg:#f5f7f5;--card:#fff;--correct:#1f9d57;--correct-bg:#e8f7ee;
    --wrong:#d8453b;--wrong-bg:#fdecea;--amber:#d98a1f;--amber-bg:#fff4e6;
    --shadow:0 1px 3px rgba(20,40,30,.08),0 6px 24px rgba(20,40,30,.06);--radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Noto Sans JP","Yu Gothic",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.7;-webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  .wrap{max-width:560px;margin:0 auto;padding:0 16px 130px;}
  header{position:sticky;top:0;z-index:20;background:rgba(245,247,245,.86);backdrop-filter:saturate(1.4) blur(10px);
    -webkit-backdrop-filter:saturate(1.4) blur(10px);padding:10px 16px;border-bottom:1px solid var(--line);}
  .head-row{display:flex;align-items:center;gap:10px;max-width:560px;margin:0 auto;}
  .logo{font-weight:800;letter-spacing:.04em;color:var(--green);font-size:16px;}
  .logo small{font-weight:700;color:var(--muted);font-size:11px;margin-left:4px;}
  .head-spacer{flex:1;}
  .timer-chip{font-variant-numeric:tabular-nums;font-weight:800;font-size:13px;color:var(--green-d);
    background:#eaf4ef;border-radius:999px;padding:5px 11px;display:none;align-items:center;gap:5px;}
  .timer-chip.show{display:inline-flex;}
  .ghost-btn{border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:12px;font-weight:700;
    padding:7px 11px;border-radius:999px;cursor:pointer;}
  .ghost-btn:active{background:#eef2ef;}
  .pbar{height:5px;background:#e6ebe8;border-radius:999px;margin:10px auto 0;max-width:560px;overflow:hidden;}
  .pbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--green),var(--green-l));width:0;transition:width .35s ease;}

  .hero{padding:24px 4px 6px;}
  .hero h1{font-size:25px;line-height:1.3;margin:0 0 6px;font-weight:800;}
  .hero p{margin:0;color:var(--muted);font-size:14px;}

  .resume{margin:16px 0 4px;background:linear-gradient(135deg,var(--green),var(--green-l));color:#fff;border-radius:var(--radius);
    padding:16px 18px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);cursor:pointer;}
  .resume .ic{font-size:24px;}
  .resume b{display:block;font-size:15px;}
  .resume span{font-size:12.5px;opacity:.9;}
  .resume .arr{margin-left:auto;font-size:20px;}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 10px;text-align:center;box-shadow:var(--shadow);}
  .stat .num{font-size:23px;font-weight:800;color:var(--green);line-height:1;}
  .stat .lbl{font-size:11px;color:var(--muted);margin-top:6px;font-weight:600;}

  .sec-h{font-size:12px;font-weight:800;color:var(--muted);margin:20px 4px 8px;letter-spacing:.04em;}
  .modes{display:flex;flex-direction:column;gap:10px;}
  .mode{display:flex;align-items:center;gap:14px;text-align:left;width:100%;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:15px 16px;cursor:pointer;box-shadow:var(--shadow);transition:transform .08s ease;}
  .mode:active{transform:scale(.985);}
  .mode .ic{width:40px;height:40px;border-radius:12px;flex:none;display:grid;place-items:center;font-size:19px;background:#eaf4ef;color:var(--green);}
  .mode.primary .ic{background:var(--green);color:#fff;}
  .mode .t{flex:1;}
  .mode .t b{font-size:15.5px;font-weight:800;display:block;}
  .mode .t span{font-size:12px;color:var(--muted);}
  .mode .arr{color:var(--muted);font-size:18px;}
  .mode:disabled{opacity:.45;}

  .row-btns{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
  .row-btns .ghost-btn{flex:1;min-width:120px;text-align:center;padding:11px;}

  .setting{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);}
  .setting label{font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;justify-content:space-between;}
  .setting input{width:80px;font-size:15px;font-weight:800;color:var(--green-d);border:1.5px solid var(--line);border-radius:10px;padding:7px 10px;text-align:center;}
  .setting .note{font-size:11.5px;color:var(--muted);margin-top:6px;}
  #fileInput{display:none;}
  .filelabel{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--green);
    border:1.5px dashed var(--green-l);border-radius:999px;padding:10px 18px;cursor:pointer;background:#fff;justify-content:center;width:100%;margin-top:14px;}

  /* quiz */
  .qmeta{display:flex;align-items:flex-start;gap:10px;margin:18px 0 14px;}
  .badge{width:52px;height:52px;border-radius:50%;flex:none;display:grid;place-items:center;background:var(--green);color:#fff;
    font-weight:800;font-size:17px;box-shadow:0 4px 10px rgba(14,94,69,.28);}
  .tags{display:flex;flex-wrap:wrap;gap:6px;flex:1;}
  .tag{font-size:11px;font-weight:700;color:var(--green-d);background:#eaf4ef;border-radius:999px;padding:4px 10px;}
  .tag.sub{background:#fff4e6;color:#9a6a18;}
  .fav-btn{flex:none;width:40px;height:40px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-size:20px;cursor:pointer;color:#cdd5d0;line-height:1;}
  .fav-btn.on{color:#f4b400;border-color:#f4d27a;background:#fffaf0;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 18px;}
  .qtext{font-size:17px;font-weight:700;line-height:1.65;margin:0 0 6px;white-space:pre-wrap;}
  .imgnote{font-size:12.5px;color:#9a6a18;background:#fff4e6;border-radius:10px;padding:9px 12px;margin:12px 0 2px;border:1px solid #f3e2c4;}
  .qfig{display:block;width:100%;height:auto;border-radius:12px;border:1px solid var(--line);margin:14px 0 2px;background:#fff;}

  .confrow{display:flex;align-items:center;gap:8px;margin:16px 0 2px;flex-wrap:wrap;}
  .confrow .clab{font-size:12px;font-weight:800;color:var(--muted);}
  .confrow button{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;}
  .confrow button[data-pc="自信あり"].on,.confrow button[data-oc="できた"].on{border-color:var(--correct);background:var(--correct-bg);color:var(--correct);}
  .confrow button[data-pc="不安"].on,.confrow button[data-oc="微妙"].on{border-color:var(--amber);background:var(--amber-bg);color:var(--amber);}
  .confrow button[data-pc="捨て問"].on,.confrow button[data-oc="まぐれ"].on{border-color:var(--wrong);background:var(--wrong-bg);color:var(--wrong);}

  .choices{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
  .choice{display:flex;align-items:flex-start;gap:12px;text-align:left;width:100%;background:#fff;border:1.5px solid var(--line);
    border-radius:14px;padding:13px 14px;font-size:15px;line-height:1.6;cursor:pointer;color:var(--ink);transition:border-color .12s,background .12s;}
  .choice:active{background:#f4f8f6;}
  .choice .key{width:26px;height:26px;border-radius:8px;flex:none;display:grid;place-items:center;font-weight:800;font-size:14px;background:#eef2ef;color:var(--muted);margin-top:1px;}
  .choice .ctext{flex:1;}
  .choice.sel{border-color:var(--green-l);background:#eef7f2;}
  .choice.correct{border-color:var(--correct);background:var(--correct-bg);}
  .choice.correct .key{background:var(--correct);color:#fff;}
  .choice.wrong{border-color:var(--wrong);background:var(--wrong-bg);}
  .choice.wrong .key{background:var(--wrong);color:#fff;}
  .choice.dim{opacity:.55;}
  .choice .resmark{margin-left:auto;font-weight:800;font-size:18px;align-self:center;}
  .choice.correct .resmark{color:var(--correct);}
  .choice.wrong .resmark{color:var(--wrong);}
  .choice[disabled]{cursor:default;}

  .verdict{display:flex;align-items:center;gap:10px;margin:18px 0 2px;font-weight:800;font-size:17px;flex-wrap:wrap;}
  .verdict.ok{color:var(--correct);}
  .verdict.ng{color:var(--wrong);}
  .verdict .ans{margin-left:auto;font-size:13px;color:var(--muted);font-weight:700;}
  .verdict .ans b{color:var(--green);font-size:16px;}
  .verdict .tm{font-size:12px;color:var(--muted);font-weight:700;background:#eef2ef;border-radius:999px;padding:3px 9px;}

  .exp{margin-top:14px;border-top:1px dashed var(--line);padding-top:14px;}
  .exp h4{margin:0 0 10px;font-size:13px;color:var(--green);font-weight:800;}
  .exp-intro{font-size:14px;margin:0 0 12px;line-height:1.7;}
  .exp-item{display:flex;gap:10px;font-size:14px;line-height:1.7;margin-bottom:10px;}
  .exp-item .m{font-weight:800;flex:none;font-size:15px;}
  .exp-item .m.o{color:var(--correct);} .exp-item .m.x{color:var(--wrong);}
  .exp-item .lab{font-weight:800;margin-right:2px;}
  .guide{font-size:11.5px;color:var(--muted);margin-top:10px;}

  .footer{position:fixed;left:0;right:0;bottom:0;z-index:30;background:linear-gradient(180deg,rgba(245,247,245,0),rgba(245,247,245,.96) 30%);
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));}
  .footer .inner{max-width:560px;margin:0 auto;display:flex;gap:10px;}
  .btn{flex:1;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;background:var(--green);color:#fff;box-shadow:0 6px 16px rgba(14,94,69,.28);}
  .btn:active{transform:translateY(1px);}
  .btn.sec{flex:none;width:54px;background:#fff;color:var(--green);border:1.5px solid var(--line);box-shadow:none;font-size:20px;}
  .btn[disabled]{opacity:.4;}

  /* finish / review */
  .finish-head{text-align:center;padding:30px 10px 10px;}
  .finish-head .big{font-size:48px;}
  .finish-head h2{font-size:22px;margin:8px 0 2px;font-weight:800;}
  .finish-head .score{font-size:38px;font-weight:800;color:var(--green);margin:10px 0 2px;}
  .finish-head p{color:var(--muted);margin:0;}
  .rev-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
  .rev-top{display:flex;align-items:center;gap:8px;cursor:pointer;}
  .rev-no{font-weight:800;font-size:13px;color:var(--green-d);background:#eaf4ef;border-radius:8px;padding:2px 8px;}
  .rev-res{font-weight:800;font-size:15px;}
  .rev-res.ok{color:var(--correct);} .rev-res.ng{color:var(--wrong);}
  .rev-q{flex:1;font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rev-meta{margin-left:auto;font-size:11px;color:var(--muted);}
  .rev-body{display:none;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:13.5px;line-height:1.7;}
  .rev-item.open .rev-body{display:block;}

  /* stats screen */
  .stat-sec{margin-top:18px;}
  .stat-sec h3{font-size:15px;font-weight:800;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
  .rank{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);}
  .rank-head{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;margin-bottom:8px;}
  .rank-head .nm{flex:1;}
  .rank-head .acc{font-weight:800;}
  .rank-head .acc.lo{color:var(--wrong);} .rank-head .acc.mid{color:var(--amber);} .rank-head .acc.hi{color:var(--correct);}
  .rbar{height:7px;background:#eef2ef;border-radius:999px;overflow:hidden;}
  .rbar>i{display:block;height:100%;border-radius:999px;}
  .rank-meta{display:flex;gap:12px;font-size:11px;color:var(--muted);margin-top:7px;}
  .ana-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:9px 12px;background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:7px;box-shadow:var(--shadow);cursor:pointer;}
  .ana-item .no{font-weight:800;color:var(--green-d);background:#eaf4ef;border-radius:7px;padding:2px 7px;font-size:12px;}
  .ana-item .q{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);}
  .ana-item .t{font-weight:800;font-size:12px;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:18px;background:var(--card);border:1px dashed var(--line);border-radius:12px;}

  .hidden{display:none!important;}
  /* list */
  .filterbar{position:sticky;top:62px;z-index:15;display:flex;gap:8px;overflow-x:auto;padding:10px 0 12px;background:var(--bg);-webkit-overflow-scrolling:touch;}
  .fbtn{flex:none;border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;}
  .fbtn.on{border-color:var(--green);background:var(--green);color:#fff;}
  .lsec{margin:14px 0 6px;font-size:13px;font-weight:800;color:var(--green-d);display:flex;align-items:center;gap:8px;}
  .lsec .cnt{font-size:11px;font-weight:700;color:var(--muted);background:#eaf4ef;border-radius:999px;padding:2px 9px;}
  .litem{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:11px 13px;margin-bottom:7px;box-shadow:var(--shadow);cursor:pointer;transition:transform .08s;}
  .litem:active{transform:scale(.99);}
  .litem .lno{font-weight:800;font-size:13px;color:var(--green-d);background:#eaf4ef;border-radius:8px;padding:3px 9px;flex:none;min-width:42px;text-align:center;}
  .litem .lst{font-weight:800;font-size:16px;flex:none;width:22px;text-align:center;}
  .litem .lst.ok{color:var(--correct);} .litem .lst.ng{color:var(--wrong);} .litem .lst.non{color:#c4ccc7;}
  .litem .lq{flex:1;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .litem .lic{flex:none;font-size:13px;display:flex;gap:3px;align-items:center;}
  .litem .lic .star{color:#f4b400;}
  .litem .lic .cf{font-size:10px;font-weight:800;border-radius:6px;padding:1px 5px;}
  .litem .lic .cf.anx{color:var(--amber);background:var(--amber-bg);}
  .litem .lic .cf.sure{color:var(--correct);background:var(--correct-bg);}
  .litem .lic .cf.skip{color:var(--wrong);background:var(--wrong-bg);}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;font-weight:700;
    padding:10px 16px;border-radius:999px;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90%;text-align:center;}
  .toast.show{opacity:.95;}
</style>
</head>
<body>
<header>
  <div class="head-row">
    <div class="logo">CBT PASS<small>クイズ</small></div>
    <div class="head-spacer"></div>
    <div class="timer-chip" id="timerChip">⏱ <span id="timerVal">0.0</span>s</div>
    <button class="ghost-btn" id="homeBtn">ホーム</button>
  </div>
  <div class="pbar"><i id="pbarFill"></i></div>
</header>

<div class="wrap">

  <!-- HOME -->
  <section id="home">
    <div class="hero">
      <h1>歯科CBT対策<br>問題集1 基礎系</h1>
      <p id="qcount">読み込み中…</p>
    </div>

    <div class="resume hidden" id="resumeCard">
      <div class="ic">▶️</div>
      <div><b>前回の続きから再開</b><span id="resumeInfo"></span></div>
      <div class="arr">›</div>
    </div>

    <div class="stats">
      <div class="stat"><div class="num" id="sAnswered">0</div><div class="lbl">回答数</div></div>
      <div class="stat"><div class="num" id="sAcc">—</div><div class="lbl">正答率</div></div>
      <div class="stat"><div class="num" id="sFav">0</div><div class="lbl">★お気に入り</div></div>
    </div>

    <div class="sec-h">出題モード</div>
    <div class="modes">
      <button class="mode primary" data-mode="random"><div class="ic">🎲</div><div class="t"><b>ランダム出題</b><span>全問シャッフル＋解説あり</span></div><div class="arr">›</div></button>
      <button class="mode" data-mode="order"><div class="ic">📖</div><div class="t"><b>順番に解く</b><span>セクション順に出題</span></div><div class="arr">›</div></button>
      <button class="mode" data-mode="review" id="reviewMode"><div class="ic">🔁</div><div class="t"><b>間違えた問題だけ復習</b><span id="reviewCount">対象なし</span></div><div class="arr">›</div></button>
      <button class="mode" data-mode="fav" id="favMode"><div class="ic">⭐️</div><div class="t"><b>お気に入りだけ</b><span id="favCount">対象なし</span></div><div class="arr">›</div></button>
      <button class="mode" data-mode="noback"><div class="ic">🚫</div><div class="t"><b>戻れない連問モード</b><span>本番風・後戻り不可・最後にまとめて確認</span></div><div class="arr">›</div></button>
    </div>

    <div class="sec-h">分析・設定</div>
    <div class="modes">
      <button class="mode" id="listBtn"><div class="ic">📋</div><div class="t"><b>問題一覧から選ぶ</b><span>状態を見ながら1問ずつ解く</span></div><div class="arr">›</div></button>
      <button class="mode" id="statsBtn"><div class="ic">📊</div><div class="t"><b>苦手分野ランキング・時間分析</b><span>正答率／時間／不安から弱点を表示</span></div><div class="arr">›</div></button>
    </div>

    <div class="setting">
      <label>「遅い」の基準時間 <input type="number" id="slowSec" min="5" max="600" step="5"> 秒</label>
      <div class="note">これより遅い正解は「正解だが遅い問題」、この秒数以内の誤答は「速いが間違えた問題」に分類されます。</div>
    </div>

    <label class="filelabel" for="fileInput">📂 questions.json を読み込む</label>
    <input type="file" id="fileInput" accept=".json,application/json">

    <div class="row-btns">
      <button class="ghost-btn" id="resetStatsBtn">成績をリセット</button>
      <button class="ghost-btn" id="clearResumeBtn">中断データを消す</button>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="hidden">
    <div class="qmeta">
      <div class="badge" id="qBadge">001</div>
      <div class="tags">
        <span class="tag" id="qSection">—</span>
        <span class="tag" id="qCat">—</span>
        <span class="tag sub" id="qSub">—</span>
      </div>
      <button class="fav-btn" id="favBtn" title="お気に入り">☆</button>
    </div>
    <div class="card">
      <p class="qtext" id="qText"></p>
      <img class="qfig hidden" id="qFig" alt="問題の図">
      <div class="imgnote hidden" id="qImg"></div>

      <div class="confrow" id="preConf">
        <span class="clab">自信</span>
        <button data-pc="自信あり">自信あり</button>
        <button data-pc="不安">不安</button>
        <button data-pc="捨て問">捨て問</button>
      </div>

      <div class="choices" id="qChoices"></div>

      <div id="resultBlock" class="hidden">
        <div class="verdict" id="qVerdict"></div>
        <div class="confrow" id="postConf">
          <span class="clab">手応え</span>
          <button data-oc="できた">できた</button>
          <button data-oc="微妙">微妙</button>
          <button data-oc="まぐれ">まぐれ</button>
        </div>
        <div class="exp">
          <h4>📣 解説</h4>
          <p class="exp-intro hidden" id="expIntro"></p>
          <div id="expList"></div>
          <div class="guide" id="qGuide"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- FINISH / REVIEW -->
  <section id="finish" class="hidden">
    <div class="finish-head">
      <div class="big">🎉</div>
      <h2>セッション完了！</h2>
      <div class="score" id="finScore">—</div>
      <p id="finDetail"></p>
    </div>
    <div class="sec-h">この回の見直し（タップで解説）</div>
    <div id="reviewList"></div>
  </section>

  <!-- STATS -->
  <section id="stats" class="hidden">
    <div class="hero"><h1 style="font-size:22px;">📊 苦手分析</h1><p>これまでの全成績から集計</p></div>
    <div class="stat-sec">
      <h3>🔥 苦手分野ランキング</h3>
      <div id="rankList"></div>
    </div>
    <div class="stat-sec">
      <h3>🐢 正解だが遅い問題</h3>
      <div id="slowList"></div>
    </div>
    <div class="stat-sec">
      <h3>⚡️ 速いが間違えた問題</h3>
      <div id="fastList"></div>
    </div>
  </section>

  <!-- LIST -->
  <section id="list" class="hidden">
    <div class="hero"><h1 style="font-size:22px;">📋 問題一覧</h1><p id="listCount">—</p></div>
    <div class="filterbar" id="filterBar">
      <button class="fbtn on" data-f="all">すべて</button>
      <button class="fbtn" data-f="unanswered">未回答</button>
      <button class="fbtn" data-f="wrong">間違い</button>
      <button class="fbtn" data-f="fav">★お気に入り</button>
    </div>
    <div id="listBody"></div>
  </section>

</div>

<div class="footer hidden" id="footer">
  <div class="inner">
    <button class="btn sec" id="prevBtn" title="前へ">‹</button>
    <button class="btn" id="nextBtn">回答する</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DATA_FILES = [
  "data/1-60.json",
  "data/61-90.json"
];

let DEFAULT_QUESTIONS = [];

async function loadDefaultQuestions() {
  try {
    const results = await Promise.all(
      DATA_FILES.map(file => fetch(file).then(res => {
        if (!res.ok) throw new Error('fetch failed: ' + file);
        return res.json();
      }))
    );
    DEFAULT_QUESTIONS = results.flat();
  } catch(e) {
    console.warn('data/1-60.json の読み込み失敗（手動JSONで代用可）:', e);
    DEFAULT_QUESTIONS = [];
  }
}

/* ============ ストレージ ============ */
const STORE_Q='cbt_questions_v1', STORE_S='cbt_stats_v2', STORE_SET='cbt_settings_v2', STORE_SES='cbt_session_v2';
let QUESTIONS=[];
let stats={perQ:{},answered:0,correct:0};
let settings={slowSec:60};
let session=null;       // {mode,uids,idx,records,sessionCorrect}
let timer={start:0,iv:null};
let pendingPre=null;    // 選択中の事前自信

const el=id=>document.getElementById(id);
const qkey=q=>q.uid||q.id;
const qno=q=>q.display_no||q.id;

/* Safari file:// 対応：localStorageが使えない場合はメモリにフォールバック */
const _memStore={};
let _lsOk=null;
function _lsAvail(){
  if(_lsOk!==null)return _lsOk;
  try{localStorage.setItem('__t','1');localStorage.removeItem('__t');_lsOk=true;}
  catch(e){_lsOk=false;}
  return _lsOk;
}
function safeGet(k){
  try{
    if(_lsAvail()){const v=localStorage.getItem(k);return v?JSON.parse(v):null;}
    return _memStore[k]??null;
  }catch(e){return _memStore[k]??null;}
}
function safeSet(k,v){
  try{
    if(_lsAvail()){localStorage.setItem(k,JSON.stringify(v));return;}
    _memStore[k]=v;
  }catch(e){_memStore[k]=v;}
}
function safeRemove(k){
  try{if(_lsAvail())localStorage.removeItem(k);}catch(e){}
  delete _memStore[k];
}

function load(){
  const q=safeGet(STORE_Q); if(Array.isArray(q)&&q.length) window._imported=q;
  const s=safeGet(STORE_S); if(s) stats=Object.assign({perQ:{},answered:0,correct:0},s);
  const st=safeGet(STORE_SET); if(st) settings=Object.assign(settings,st);
}
const saveStats=()=>safeSet(STORE_S,stats);
const saveSettings=()=>safeSet(STORE_SET,settings);
const saveSession=()=>{ if(session&&!session.single) safeSet(STORE_SES,session); };
const clearSession=()=>{ safeRemove(STORE_SES); };

function resolveQuestions(){
  if(window._imported&&window._imported.length) return window._imported;
  return DEFAULT_QUESTIONS;
}
function rec(uid){ return stats.perQ[uid]||(stats.perQ[uid]={correct:0,wrong:0,last:null,times:[],pre:[],post:[],fav:false}); }

function toast(m){const t=el('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}
function showOnly(id){['home','quiz','finish','stats','list'].forEach(s=>el(s).classList.toggle('hidden',s!==id));}
function setProgress(p){el('pbarFill').style.width=Math.max(0,Math.min(100,p))+'%';}
function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ============ タイマー ============ */
function startTimer(){
  timer.start=Date.now();
  el('timerChip').classList.add('show');
  clearInterval(timer.iv);
  timer.iv=setInterval(()=>{ el('timerVal').textContent=((Date.now()-timer.start)/1000).toFixed(1); },100);
}
function stopTimer(){ clearInterval(timer.iv); return (Date.now()-timer.start)/1000; }

/* ============ ホーム ============ */
function wrongList(){return QUESTIONS.filter(q=>{const r=stats.perQ[qkey(q)];return r&&r.last==='wrong';}).map(qkey);}
function favList(){return QUESTIONS.filter(q=>{const r=stats.perQ[qkey(q)];return r&&r.fav;}).map(qkey);}

function renderHome(){
  el('timerChip').classList.remove('show'); clearInterval(timer.iv);
  el('qcount').textContent=`全 ${QUESTIONS.length} 問 ・ ${QUESTIONS.filter(q=>q.image).length} 問は図つき`;
  el('sAnswered').textContent=stats.answered;
  el('sAcc').textContent=stats.answered?Math.round(stats.correct/stats.answered*100)+'%':'—';
  el('sFav').textContent=favList().length;
  const wl=wrongList(); el('reviewCount').textContent=wl.length?`${wl.length} 問が対象`:'対象なし'; el('reviewMode').disabled=!wl.length;
  const fl=favList(); el('favCount').textContent=fl.length?`${fl.length} 問が対象`:'対象なし'; el('favMode').disabled=!fl.length;
  el('slowSec').value=settings.slowSec;
  // resume
  const ses=safeGet(STORE_SES);
  if(ses&&ses.uids&&(ses.records?ses.records.length:ses.idx)<ses.uids.length){
    el('resumeCard').classList.remove('hidden');
    const nm={random:'ランダム',order:'順番',review:'復習',fav:'お気に入り',noback:'連問'}[ses.mode]||'';
    const done=ses.records?ses.records.length:ses.idx;
    el('resumeInfo').textContent=`${nm}モード ・ ${done}/${ses.uids.length}問まで完了`;
  } else el('resumeCard').classList.add('hidden');
  showOnly('home'); el('footer').classList.add('hidden'); setProgress(0);
}

/* ============ セッション ============ */
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function byUid(uid){return QUESTIONS.find(q=>qkey(q)===uid);}

function startSession(mode){
  let pool;
  if(mode==='order'){pool=QUESTIONS.map(qkey);}
  else if(mode==='review'){pool=shuffle(wrongList());}
  else if(mode==='fav'){pool=shuffle(favList());}
  else {pool=shuffle(QUESTIONS.map(qkey));} // random / noback
  if(!pool.length){toast('対象の問題がありません');return;}
  session={mode,uids:pool,idx:0,records:[],sessionCorrect:0};
  saveSession();
  el('footer').classList.remove('hidden');
  renderQuestion();
}
function resumeSession(){
  const ses=safeGet(STORE_SES);
  if(!ses){renderHome();return;}
  ses.uids=ses.uids.filter(byUid);
  // 回答済みの次の問題から再開（二重カウント防止）
  ses.idx=Math.min(ses.records?ses.records.length:ses.idx, ses.uids.length);
  session=ses;
  if(session.idx>=session.uids.length){clearSession();renderHome();return;}
  el('footer').classList.remove('hidden');
  renderQuestion();
}

/* ============ 問題描画 ============ */
let answered=false, picked=null;
function renderQuestion(){
  showOnly('quiz');
  const q=byUid(session.uids[session.idx]);
  answered=false; picked=null; pendingPre=null;
  const noback=session.mode==='noback';

  el('qBadge').textContent=qno(q);
  el('qSection').textContent=q.section||'—';
  el('qCat').textContent=q.category||'';
  el('qSub').textContent=q.subject?'科目: '+q.subject:''; el('qSub').classList.toggle('hidden',!q.subject);
  el('qText').textContent=q.question;

  const fig=el('qFig'),img=el('qImg');
  if(q.image){fig.src=q.image;fig.classList.remove('hidden');}else{fig.classList.add('hidden');fig.removeAttribute('src');}
  if(q.has_image&&!q.image){img.textContent='🖼 '+(q.image_note||'この問題には画像があります。');img.classList.remove('hidden');}else img.classList.add('hidden');

  // favorite
  const r=stats.perQ[qkey(q)];
  setFav(r&&r.fav);

  // pre-confidence reset
  document.querySelectorAll('#preConf button').forEach(b=>b.classList.remove('on'));
  el('preConf').classList.remove('hidden');

  // choices
  const wrap=el('qChoices');wrap.innerHTML='';
  Object.keys(q.choices).forEach(k=>{
    const b=document.createElement('button');b.className='choice';b.dataset.key=k;
    b.innerHTML=`<span class="key">${k}</span><span class="ctext">${escapeHtml(q.choices[k])}</span>`;
    b.addEventListener('click',()=>pick(k));
    wrap.appendChild(b);
  });

  el('resultBlock').classList.add('hidden');
  document.querySelectorAll('#postConf button').forEach(b=>b.classList.remove('on'));
  el('nextBtn').textContent='回答する'; el('nextBtn').disabled=true;
  el('prevBtn').style.display=noback?'none':'';
  el('prevBtn').disabled=session.idx===0;

  setProgress(session.idx/session.uids.length*100);
  startTimer();
  window.scrollTo({top:0,behavior:'smooth'});
}
function setFav(on){el('favBtn').textContent=on?'★':'☆';el('favBtn').classList.toggle('on',!!on);}

function pick(k){
  if(answered)return;
  picked=k;
  document.querySelectorAll('.choice').forEach(c=>c.classList.toggle('sel',c.dataset.key===k));
  el('nextBtn').disabled=false;
}

/* 事前自信 */
document.querySelectorAll('#preConf button').forEach(b=>{
  b.addEventListener('click',()=>{
    if(answered)return;
    pendingPre=b.dataset.pc;
    document.querySelectorAll('#preConf button').forEach(x=>x.classList.toggle('on',x===b));
    if(pendingPre==='捨て問'){ submit(true); } // 捨て問は即・解答表示
  });
});
/* 事後手応え */
document.querySelectorAll('#postConf button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('#postConf button').forEach(x=>x.classList.toggle('on',x===b));
    const r=session.records[session.records.length-1];
    if(r){r.post=b.dataset.oc; const pr=rec(r.uid); pr.post.push(b.dataset.oc); saveStats();}
  });
});

/* 採点 */
function submit(skip){
  const q=byUid(session.uids[session.idx]);
  const t=stopTimer();
  const correct = !skip && picked===q.answer;
  answered=true;
  const noback=session.mode==='noback';

  // 選択肢の見た目（連問モードは結果を隠す）
  document.querySelectorAll('.choice').forEach(c=>{
    c.disabled=true;c.classList.remove('sel');
    if(noback){ if(c.dataset.key===picked)c.classList.add('sel'); return; }
    const key=c.dataset.key;
    if(key===q.answer){c.classList.add('correct');c.insertAdjacentHTML('beforeend','<span class="resmark">○</span>');}
    else if(key===picked){c.classList.add('wrong');c.insertAdjacentHTML('beforeend','<span class="resmark">✗</span>');}
    else c.classList.add('dim');
  });
  el('preConf').classList.add('hidden');
  el('timerChip').classList.remove('show'); clearInterval(timer.iv);

  // 記録
  const r=rec(qkey(q));
  if(correct){r.correct++;stats.correct++;session.sessionCorrect++;}else{r.wrong++;}
  r.last=correct?'correct':'wrong'; r.times.push(+t.toFixed(1));
  if(pendingPre)r.pre.push(pendingPre);
  stats.answered++; saveStats();
  session.records.push({uid:qkey(q),no:qno(q),section:q.section,picked:skip?null:picked,answer:q.answer,correct,skip:!!skip,time:+t.toFixed(1),pre:pendingPre,post:null});
  saveSession();

  if(noback){
    // 結果も解説も出さず次へ
    el('nextBtn').textContent=(session.idx<session.uids.length-1)?'次の問題へ ›':lastLabel();
    setProgress((session.idx+1)/session.uids.length*100);
    return;
  }

  // verdict
  const v=el('qVerdict');v.className='verdict '+(correct?'ok':'ng');
  v.innerHTML=(skip?'⏭ 捨て問':(correct?'⭕️ 正解！':'❌ 不正解'))
    +`<span class="tm">⏱ ${t.toFixed(1)}s</span><span class="ans">正解 <b>${q.answer}</b></span>`;
  // explanation
  const intro=el('expIntro');
  if(q.explanation_intro){intro.textContent=q.explanation_intro;intro.classList.remove('hidden');}else intro.classList.add('hidden');
  const list=el('expList');list.innerHTML='';
  (q.explanation||[]).forEach(it=>{
    const mk=it.mark||'';const cls=(mk.includes('✗')&&mk.includes('○'))?'':(mk.includes('○')?'o':(mk.includes('✗')?'x':''));
    const d=document.createElement('div');d.className='exp-item';
    d.innerHTML=`<span class="m ${cls}">${escapeHtml(mk)}</span><span><span class="lab">${escapeHtml(it.labels||'')}：</span>${escapeHtml(it.text||'')}</span>`;
    list.appendChild(d);
  });
  el('qGuide').textContent=q.guide_ref?`📘 ガイド編 ▶ ${q.guide_ref}　／　科目 ▶ ${q.subject||''}`:'';
  el('resultBlock').classList.remove('hidden');
  el('nextBtn').textContent=(session.idx<session.uids.length-1)?'次の問題へ ›':lastLabel();
  setProgress((session.idx+1)/session.uids.length*100);
  setTimeout(()=>el('resultBlock').scrollIntoView({behavior:'smooth',block:'nearest'}),60);
}

function lastLabel(){ if(session.single&&session.returnTo==='list')return '一覧に戻る'; if(session.single&&session.returnTo==='stats')return '分析に戻る'; return '結果を見る'; }
function next(){
  if(!answered){submit(false);return;}
  if(session.idx<session.uids.length-1){session.idx++;saveSession();renderQuestion();}
  else { if(session.single&&session.returnTo==='list'){clearSession();renderList();showOnly('list');el('footer').classList.add('hidden');} else if(session.single&&session.returnTo==='stats'){clearSession();openStats();} else finish(); }
}
function prev(){ if(session.mode!=='noback'&&session.idx>0){session.idx--;saveSession();renderQuestion();} }

/* ============ 完了・見直し ============ */
function finish(){
  clearSession();
  showOnly('finish');el('footer').classList.add('hidden');setProgress(100);
  el('timerChip').classList.remove('show');clearInterval(timer.iv);
  const n=session.records.length,c=session.sessionCorrect;
  const nm={random:'ランダム出題',order:'順番に解く',review:'間違い復習',fav:'お気に入り',noback:'戻れない連問'}[session.mode]||'';
  const totT=session.records.reduce((s,r)=>s+r.time,0);
  el('finScore').textContent=`${c} / ${n}`;
  el('finDetail').textContent=`${nm} ・ 正答率 ${n?Math.round(c/n*100):0}% ・ 合計 ${totT.toFixed(0)}秒（平均 ${n?(totT/n).toFixed(1):0}秒/問）`;
  const wrap=el('reviewList');wrap.innerHTML='';
  session.records.forEach(r=>{
    const q=byUid(r.uid);
    const item=document.createElement('div');item.className='rev-item';
    const res=r.skip?'⏭':(r.correct?'○':'✗');const rc=r.correct?'ok':'ng';
    item.innerHTML=`<div class="rev-top">
        <span class="rev-no">${r.no}</span>
        <span class="rev-res ${rc}">${res}</span>
        <span class="rev-q">${escapeHtml(q.question.split('\n')[0])}</span>
        <span class="rev-meta">${r.time}s</span>
      </div><div class="rev-body"></div>`;
    const body=item.querySelector('.rev-body');
    let h=`<div style="margin-bottom:6px;"><b>あなたの解答:</b> ${r.skip?'（捨て問）':escapeHtml(r.picked||'—')}　/　<b>正解:</b> ${escapeHtml(r.answer)}</div>`;
    if(q.explanation_intro)h+=`<div style="margin-bottom:6px;">${escapeHtml(q.explanation_intro)}</div>`;
    (q.explanation||[]).forEach(it=>{h+=`<div style="margin-bottom:5px;"><b>${escapeHtml(it.mark||'')} ${escapeHtml(it.labels||'')}：</b>${escapeHtml(it.text||'')}</div>`;});
    body.innerHTML=h;
    item.querySelector('.rev-top').addEventListener('click',()=>item.classList.toggle('open'));
    wrap.appendChild(item);
  });
}

/* ============ 苦手分析 ============ */
function openStats(){
  showOnly('stats');el('footer').classList.add('hidden');setProgress(0);el('timerChip').classList.remove('show');
  // セクション集計
  const secs={};
  QUESTIONS.forEach(q=>{const r=stats.perQ[qkey(q)];if(!r||(r.correct+r.wrong)===0)return;
    const s=secs[q.section]||(secs[q.section]={ans:0,cor:0,tsum:0,tn:0,anx:0});
    s.ans+=r.correct+r.wrong; s.cor+=r.correct;
    r.times.forEach(t=>{s.tsum+=t;s.tn++;});
    s.anx+=r.pre.filter(p=>p==='不安'||p==='捨て問').length;
  });
  const arr=Object.entries(secs).map(([name,s])=>{
    const acc=s.ans?s.cor/s.ans:0, avgT=s.tn?s.tsum/s.tn:0, anxR=s.ans?s.anx/s.ans:0;
    const weak=(1-acc)*0.6+Math.min(avgT/Math.max(settings.slowSec,1),1)*0.2+anxR*0.2;
    return {name,acc,avgT,anxR,ans:s.ans,weak};
  }).sort((a,b)=>b.weak-a.weak);
  const rl=el('rankList');rl.innerHTML='';
  if(!arr.length){rl.innerHTML='<div class="empty">まだ回答データがありません。問題を解くとここに苦手分野が出ます。</div>';}
  arr.forEach(x=>{
    const pct=Math.round(x.acc*100);const cls=pct<50?'lo':(pct<75?'mid':'hi');
    const col=pct<50?'#d8453b':(pct<75?'#d98a1f':'#1f9d57');
    const d=document.createElement('div');d.className='rank';
    d.innerHTML=`<div class="rank-head"><span class="nm">${escapeHtml(x.name)}</span><span class="acc ${cls}">${pct}%</span></div>
      <div class="rbar"><i style="width:${pct}%;background:${col};"></i></div>
      <div class="rank-meta"><span>解答 ${x.ans}問</span><span>平均 ${x.avgT.toFixed(1)}秒</span><span>不安率 ${Math.round(x.anxR*100)}%</span></div>`;
    rl.appendChild(d);
  });
  // 時間分析
  const slow=[],fast=[];
  QUESTIONS.forEach(q=>{const r=stats.perQ[qkey(q)];if(!r||!r.times.length)return;
    const lastT=r.times[r.times.length-1];
    if(r.last==='correct'&&lastT>settings.slowSec)slow.push({q,t:lastT});
    if(r.last==='wrong'&&lastT<=settings.slowSec)fast.push({q,t:lastT});
  });
  slow.sort((a,b)=>b.t-a.t);fast.sort((a,b)=>a.t-b.t);
  fillAna('slowList',slow,'まだありません');
  fillAna('fastList',fast,'まだありません');
}
function fillAna(id,arr,emptyMsg){
  const c=el(id);c.innerHTML='';
  if(!arr.length){c.innerHTML=`<div class="empty">${emptyMsg}</div>`;return;}
  arr.forEach(({q,t})=>{
    const d=document.createElement('div');d.className='ana-item';
    d.innerHTML=`<span class="no">${qno(q)}</span><span class="q">${escapeHtml(q.section)}｜${escapeHtml(q.question.split('\n')[0])}</span><span class="t">${t}s</span>`;
    d.addEventListener('click',()=>{ startSingle(qkey(q),'stats'); });
    c.appendChild(d);
  });
}
function startSingle(uid,returnTo){ session={mode:'order',uids:[uid],idx:0,records:[],sessionCorrect:0,single:true,returnTo:returnTo||null}; el('footer').classList.remove('hidden'); renderQuestion(); }

/* ============ 問題一覧 ============ */
let listFilter='all';
function openList(){
  el('footer').classList.add('hidden'); el('timerChip').classList.remove('show'); setProgress(0);
  renderList();
  showOnly('list');
}
function statusOf(q){ const r=stats.perQ[qkey(q)]; if(!r||(r.correct+r.wrong)===0)return 'non'; return r.last==='correct'?'ok':'ng'; }
function renderList(){
  document.querySelectorAll('#filterBar .fbtn').forEach(b=>b.classList.toggle('on',b.dataset.f===listFilter));
  const pass=q=>{const r=stats.perQ[qkey(q)];
    if(listFilter==='unanswered')return !r||(r.correct+r.wrong)===0;
    if(listFilter==='wrong')return r&&r.last==='wrong';
    if(listFilter==='fav')return r&&r.fav;
    return true;};
  const body=el('listBody'); body.innerHTML='';
  const groups={}; let total=0;
  QUESTIONS.forEach(q=>{ if(!pass(q))return; (groups[q.section]||(groups[q.section]=[])).push(q); total++; });
  el('listCount').textContent=`${total} 問`+(listFilter!=='all'?'（絞り込み中）':'');
  if(!total){ body.innerHTML='<div class="empty">該当する問題がありません。</div>'; return; }
  Object.keys(groups).forEach(sec=>{
    const h=document.createElement('div');h.className='lsec';
    h.innerHTML=`${escapeHtml(sec)}<span class="cnt">${groups[sec].length}</span>`; body.appendChild(h);
    groups[sec].forEach(q=>{
      const r=stats.perQ[qkey(q)]||{};
      const st=statusOf(q); const mark=st==='ok'?'○':(st==='ng'?'✗':'・');
      let ic='';
      if(r.fav)ic+='<span class="star">★</span>';
      const lastPre=r.pre&&r.pre.length?r.pre[r.pre.length-1]:null;
      if(lastPre==='不安')ic+='<span class="cf anx">不安</span>';
      else if(lastPre==='自信あり')ic+='<span class="cf sure">自信</span>';
      else if(lastPre==='捨て問')ic+='<span class="cf skip">捨</span>';
      const it=document.createElement('div');it.className='litem';
      it.innerHTML=`<span class="lno">${qno(q)}</span><span class="lst ${st}">${mark}</span>
        <span class="lq">${escapeHtml(q.question.split('\n')[0])}</span><span class="lic">${ic}</span>`;
      it.addEventListener('click',()=>startSingle(qkey(q),'list'));
      body.appendChild(it);
    });
  });
}

/* ============ お気に入りトグル ============ */
el('favBtn').addEventListener('click',()=>{
  if(!session)return;const q=byUid(session.uids[session.idx]);const r=rec(qkey(q));
  r.fav=!r.fav; setFav(r.fav); saveStats(); toast(r.fav?'★ お気に入りに追加':'お気に入りを解除');
});

/* ============ ファイル読込 ============ */
el('fileInput').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{
    const data=JSON.parse(rd.result);
    if(!Array.isArray(data)||!data.length)throw 0;
    if(!data.every(q=>(q.uid||q.id)&&q.question&&q.choices&&q.answer))throw 0;
    window._imported=data; safeSet(STORE_Q,data); QUESTIONS=resolveQuestions();
    toast(`${data.length} 問を読み込みました`); renderHome();
  }catch(_){toast('JSONの形式が正しくありません');}};
  rd.readAsText(f,'utf-8'); e.target.value='';
});

/* ============ イベント ============ */
document.querySelectorAll('.mode[data-mode]').forEach(b=>b.addEventListener('click',()=>{if(!b.disabled)startSession(b.dataset.mode);}));
el('statsBtn').addEventListener('click',openStats);
el('listBtn').addEventListener('click',openList);
document.querySelectorAll('#filterBar .fbtn').forEach(b=>b.addEventListener('click',()=>{listFilter=b.dataset.f;renderList();}));
el('resumeCard').addEventListener('click',resumeSession);
el('nextBtn').addEventListener('click',next);
el('prevBtn').addEventListener('click',prev);
el('homeBtn').addEventListener('click',()=>{ if(session&&session.records&&session.idx<session.uids.length){saveSession();} renderHome(); });
el('slowSec').addEventListener('change',e=>{let v=parseInt(e.target.value)||60;v=Math.max(5,Math.min(600,v));settings.slowSec=v;e.target.value=v;saveSettings();toast(`基準を ${v}秒 に設定`);});
el('resetStatsBtn').addEventListener('click',()=>{if(confirm('回答履歴・正答率・お気に入りをすべて消します。よろしいですか？')){stats={perQ:{},answered:0,correct:0};saveStats();renderHome();toast('成績をリセットしました');}});
el('clearResumeBtn').addEventListener('click',()=>{clearSession();renderHome();toast('中断データを消しました');});

/* ============ 初期化 ============ */
(async () => {
  await loadDefaultQuestions();
  load();
  QUESTIONS = resolveQuestions();
  renderHome();
  // Safari file:// でlocalStorage使えない場合に警告
  if (!_lsAvail()) {
    setTimeout(() => toast('⚠️ 成績はページを閉じると消えます（Safari file://制限）'), 600);
  }
})();
</script>
</body>
</html>
